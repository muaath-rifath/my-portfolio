    <circle cx="284" cy="165" r="26" fill="none" stroke="#0ea5e9" stroke-width="8" stroke-dasharray="40 120"/>
    <circle cx="284" cy="165" r="26" fill="none" stroke="#14b8a6" stroke-width="8" stroke-dasharray="30 120" stroke-dashoffset="-40"/>
    <circle cx="284" cy="165" r="26" fill="none" stroke="#a78bfa" stroke-width="8" stroke-dasharray="25 120" stroke-dashoffset="-70"/>
    <circle cx="284" cy="165" r="26" fill="none" stroke="#f59e0b" stroke-width="8" stroke-dasharray="20 120" stroke-dashoffset="-95"/>
    <!-- Table area -->
    <rect x="72" y="212" width="274" height="96" rx="8" fill="#1f2937"/>
    <text x="82" y="228" font-family="Arial, sans-serif" font-size="7" fill="rgba(255,255,255,0.5)">Recent Activity</text>
    <rect x="82" y="238" width="252" height="1" fill="rgba(255,255,255,0.06)"/>
    <rect x="82" y="244" width="50" height="3" rx="1.5" fill="rgba(255,255,255,0.2)"/>
    <rect x="150" y="244" width="70" height="3" rx="1.5" fill="rgba(255,255,255,0.15)"/>
    <rect x="270" y="244" width="40" height="3" rx="1.5" fill="rgba(14,165,233,0.4)"/>
    <rect x="82" y="256" width="252" height="1" fill="rgba(255,255,255,0.04)"/>
    <rect x="82" y="262" width="45" height="3" rx="1.5" fill="rgba(255,255,255,0.2)"/>
    <rect x="150" y="262" width="60" height="3" rx="1.5" fill="rgba(255,255,255,0.15)"/>
    <rect x="270" y="262" width="35" height="3" rx="1.5" fill="rgba(20,184,166,0.4)"/>
    <rect x="82" y="274" width="252" height="1" fill="rgba(255,255,255,0.04)"/>
    <rect x="82" y="280" width="55" height="3" rx="1.5" fill="rgba(255,255,255,0.2)"/>
    <rect x="150" y="280" width="65" height="3" rx="1.5" fill="rgba(255,255,255,0.15)"/>
    <rect x="270" y="280" width="45" height="3" rx="1.5" fill="rgba(124,58,237,0.4)"/>
    <rect x="82" y="292" width="252" height="1" fill="rgba(255,255,255,0.04)"/>
