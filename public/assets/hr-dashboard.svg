    <rect x="72" y="44" width="86" height="50" rx="8" fill="#1f2937" stroke="rgba(14,165,233,0.15)" stroke-width="1"/>
    <text x="82" y="62" font-family="Arial, sans-serif" font-size="7" fill="rgba(255,255,255,0.5)">Total Employees</text>
    <text x="82" y="80" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#0ea5e9">1,247</text>
    <rect x="166" y="44" width="86" height="50" rx="8" fill="#1f2937" stroke="rgba(20,184,166,0.15)" stroke-width="1"/>
    <text x="176" y="62" font-family="Arial, sans-serif" font-size="7" fill="rgba(255,255,255,0.5)">Retention Rate</text>
    <text x="176" y="80" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#14b8a6">94.2%</text>
    <rect x="260" y="44" width="86" height="50" rx="8" fill="#1f2937" stroke="rgba(124,58,237,0.15)" stroke-width="1"/>
    <text x="270" y="62" font-family="Arial, sans-serif" font-size="7" fill="rgba(255,255,255,0.5)">New Hires</text>
    <text x="270" y="80" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#a78bfa">38</text>
    <!-- Bar chart -->
    <rect x="72" y="106" width="140" height="95" rx="8" fill="#1f2937"/>
    <text x="82" y="122" font-family="Arial, sans-serif" font-size="7" fill="rgba(255,255,255,0.5)">Monthly Headcount</text>
    <rect x="84" y="168" width="10" height="24" rx="2" fill="rgba(14,165,233,0.4)"/>
    <rect x="98" y="158" width="10" height="34" rx="2" fill="rgba(14,165,233,0.5)"/>
    <rect x="112" y="148" width="10" height="44" rx="2" fill="rgba(14,165,233,0.6)"/>
    <rect x="126" y="155" width="10" height="37" rx="2" fill="rgba(14,165,233,0.55)"/>
    <rect x="140" y="142" width="10" height="50" rx="2" fill="rgba(14,165,233,0.7)"/>
    <rect x="154" y="135" width="10" height="57" rx="2" fill="#0ea5e9"/>
    <rect x="168" y="140" width="10" height="52" rx="2" fill="rgba(14,165,233,0.65)"/>
    <rect x="182" y="150" width="10" height="42" rx="2" fill="rgba(14,165,233,0.5)"/>
