<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <linearGradient id="hrBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0d2035;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="hrAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#14b8a6;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="800" height="400" rx="16" fill="url(#hrBg)"/>
  <!-- Decorative -->
  <circle cx="650" cy="80" r="180" fill="rgba(14,165,233,0.05)"/>
  <circle cx="150" cy="380" r="120" fill="rgba(20,184,166,0.04)"/>
  <!-- Dashboard mockup -->
  <g transform="translate(380, 40)">
    <!-- Dashboard frame -->
    <rect x="0" y="0" width="370" height="320" rx="12" fill="#111827" stroke="rgba(14,165,233,0.2)" stroke-width="1.5"/>
    <!-- Top bar -->
    <rect x="0" y="0" width="370" height="32" rx="12" fill="#1f2937"/>
    <rect x="280" y="0" width="90" height="32" rx="0" fill="#1f2937"/>
    <circle cx="16" cy="16" r="4" fill="#ef4444"/>
    <circle cx="30" cy="16" r="4" fill="#eab308"/>
    <circle cx="44" cy="16" r="4" fill="#22c55e"/>
    <!-- Sidebar -->
    <rect x="0" y="32" width="60" height="288" fill="#1a2332"/>
    <rect x="14" y="48" width="32" height="4" rx="2" fill="rgba(14,165,233,0.4)"/>
    <rect x="14" y="64" width="32" height="3" rx="1.5" fill="rgba(255,255,255,0.15)"/>
    <rect x="14" y="78" width="32" height="3" rx="1.5" fill="rgba(255,255,255,0.15)"/>
    <rect x="14" y="92" width="32" height="3" rx="1.5" fill="rgba(255,255,255,0.15)"/>
    <rect x="10" y="106" width="40" height="20" rx="4" fill="rgba(14,165,233,0.1)"/>
    <rect x="14" y="114" width="32" height="3" rx="1.5" fill="rgba(14,165,233,0.5)"/>
