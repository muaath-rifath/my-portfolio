  <!-- Text content -->
  <text x="60" y="120" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="400" fill="#0ea5e9" letter-spacing="3">ANALYTICS PROJECT</text>
  <text x="60" y="175" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="800" fill="#ffffff">HR</text>
  <text x="60" y="220" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="800" fill="#ffffff">Dashboard</text>
  <!-- Divider -->
  <rect x="60" y="240" width="60" height="3" rx="1.5" fill="url(#hrAccent)"/>
  <!-- Tech tags -->
  <rect x="60" y="265" width="80" height="26" rx="13" fill="rgba(14,165,233,0.12)" stroke="rgba(14,165,233,0.3)" stroke-width="1"/>
  <text x="100" y="283" font-family="Arial, sans-serif" font-size="11" fill="#38bdf8" text-anchor="middle">Power BI</text>
  <rect x="150" y="265" width="60" height="26" rx="13" fill="rgba(20,184,166,0.12)" stroke="rgba(20,184,166,0.3)" stroke-width="1"/>
  <text x="180" y="283" font-family="Arial, sans-serif" font-size="11" fill="#5eead4" text-anchor="middle">SQL</text>
  <rect x="220" y="265" width="90" height="26" rx="13" fill="rgba(14,165,233,0.12)" stroke="rgba(14,165,233,0.3)" stroke-width="1"/>
  <text x="265" y="283" font-family="Arial, sans-serif" font-size="11" fill="#38bdf8" text-anchor="middle">Analytics</text>
</svg>