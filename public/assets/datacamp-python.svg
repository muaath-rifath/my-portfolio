<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <linearGradient id="dcCertBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1a0a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0d2d15;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="dcAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#03ef62;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#05b44a;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="800" height="400" rx="16" fill="url(#dcCertBg)"/>
  <!-- Top accent bar -->
  <rect y="0" width="800" height="6" rx="3" fill="url(#dcAccent)"/>
  <!-- Decorative -->
  <circle cx="700" cy="90" r="130" fill="rgba(3,239,98,0.04)"/>
  <circle cx="100" cy="340" r="90" fill="rgba(5,180,74,0.04)"/>
  <!-- Chart icon (left) -->
  <g transform="translate(60, 130)">
    <rect x="0" y="70" width="16" height="40" rx="3" fill="rgba(3,239,98,0.5)"/>
    <rect x="24" y="50" width="16" height="60" rx="3" fill="rgba(3,239,98,0.65)"/>
    <rect x="48" y="30" width="16" height="80" rx="3" fill="rgba(3,239,98,0.8)"/>
    <rect x="72" y="10" width="16" height="100" rx="3" fill="#03ef62"/>
    <!-- Python snake hint -->
    <path d="M100 80 Q110 60 105 40 Q100 20 110 10" fill="none" stroke="rgba(3,239,98,0.4)" stroke-width="3" stroke-linecap="round"/>
    <circle cx="110" cy="10" r="4" fill="rgba(3,239,98,0.5)"/>
  </g>
  <!-- Certificate text -->
  <text x="240" y="120" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="400" fill="#03ef62" letter-spacing="3">COURSE CERTIFICATE</text>
  <text x="240" y="178" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700" fill="#ffffff">Intermediate Python</text>
  <!-- Divider -->
  <rect x="240" y="200" width="80" height="3" rx="1.5" fill="#03ef62"/>
  <!-- Issuer -->
  <text x="240" y="245" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="rgba(255,255,255,0.6)">Issued by</text>
  <text x="240" y="272" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="600" fill="#ffffff">DataCamp</text>
  <!-- Skills tags -->
  <rect x="240" y="295" width="90" height="28" rx="14" fill="rgba(3,239,98,0.12)" stroke="rgba(3,239,98,0.3)" stroke-width="1"/>
  <text x="285" y="314" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#03ef62" text-anchor="middle">Python</text>
  <rect x="340" y="295" width="120" height="28" rx="14" fill="rgba(3,239,98,0.12)" stroke="rgba(3,239,98,0.3)" stroke-width="1"/>
  <text x="400" y="314" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#03ef62" text-anchor="middle">Data Science</text>
  <rect x="470" y="295" width="110" height="28" rx="14" fill="rgba(3,239,98,0.12)" stroke="rgba(3,239,98,0.3)" stroke-width="1"/>
  <text x="525" y="314" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#03ef62" text-anchor="middle">Matplotlib</text>
  <!-- Badge -->
  <g transform="translate(640, 240)">
    <circle cx="40" cy="40" r="38" fill="none" stroke="#03ef62" stroke-width="2" stroke-dasharray="6 3"/>
    <circle cx="40" cy="40" r="28" fill="rgba(3,239,98,0.12)"/>
    <text x="40" y="46" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#03ef62" text-anchor="middle">&#10003;</text>
  </g>
  <!-- Bottom border -->
  <rect y="394" width="800" height="6" rx="3" fill="url(#dcAccent)"/>
</svg>